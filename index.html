<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks & Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fafafa;
      overflow-x: hidden;
    }

    section {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    #todo-section {
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
      justify-content: flex-start;
      padding-top: calc(50vh - 100px);
      transition: padding-top 1.5s ease-in-out;
    }

    #game-section {
      background: linear-gradient(135deg, #e0f2f1 0%, #b3e5fc 100%);
    }

    #tictactoe-section {
      background: linear-gradient(135deg, #f1f8e9 0%, #ffe0b2 100%);
    }

    h1 {
      font-size: 2.5rem;
      color: #5e35b1;
      margin-bottom: 30px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    #game-section h1 {
      color: #00796b;
    }

    #tictactoe-section h1 {
      color: #558b2f;
    }

    .todo-container {
      width: 100%;
      max-width: 500px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #ce93d8;
      border-radius: 8px;
      font-size: 1rem;
      background-color: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #8e24aa;
      background-color: white;
      box-shadow: 0 0 10px rgba(142, 36, 170, 0.2);
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #add-btn {
      background-color: #ce93d8;
      color: white;
    }

    #add-btn:hover {
      background-color: #8e24aa;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(142, 36, 170, 0.3);
    }

    #add-btn:disabled {
      background-color: #b19cd9;
      color: #e0e0e0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      opacity: 0.6;
    }

    #tasks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-wrapper {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .task-item {
      padding: 16px;
      background-color: rgba(255, 255, 255, 0.7);
      border-radius: 8px;
      border-left: 4px solid #ce93d8;
      font-size: 1.05rem;
      color: #424242;
      transition: all 0.2s ease;
      flex: 1;
      display: flex;
      align-items: center;
      word-break: break-word;
    }

    .task-item:hover {
      background-color: white;
      box-shadow: 0 2px 8px rgba(142, 36, 170, 0.15);
    }

    .task-buttons {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #welcome-msg .task-buttons {
      display: none;
    }

    .task-item:not(#welcome-msg) {
      display: flex;
    }

    #welcome-msg {
      display: flex;
    }
    .remove-btn,
    .completed-btn {
      padding: 8px;
      background-color: transparent;
      border: none;
      border-radius: 6px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .remove-btn:hover {
      background-color: #f8bbd0;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 2px 6px rgba(194, 24, 91, 0.3);
    }

    .completed-btn:hover {
      background-color: #c8e6c9;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 2px 6px rgba(46, 125, 50, 0.3);
    }

    .completed-btn.active {
      background-color: #c8e6c9;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 2px 6px rgba(46, 125, 50, 0.3);
    }

    .task-wrapper.remove-animation {
      animation: slideOutLeft 0.5s ease forwards;
    }

    .completed-btn.bounce-animation {
      animation: buttonBounce 0.6s ease;
    }

    @keyframes slideOutLeft {
      0% {
        opacity: 1;
        transform: translateX(0);
      }
      100% {
        opacity: 0;
        transform: translateX(-100%);
      }
    }

    @keyframes buttonBounce {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    .game-container {
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    .game-info {
      font-size: 1.1rem;
      color: #00796b;
      margin-bottom: 20px;
      font-weight: 300;
    }

    #game-canvas {
      width: 100%;
      height: 300px;
      background-color: rgba(255, 255, 255, 0.6);
      border: 3px solid #80cbc4;
      border-radius: 8px;
      margin-top: 20px;
      position: relative;
      overflow: hidden;
    }

    #rectangle {
      width: 60px;
      height: 60px;
      background-color: #4db6ac;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 4px;
      transition: all 0.05s linear;
      box-shadow: 0 4px 8px rgba(0, 121, 107, 0.3);
      z-index: 1;
    }

    #start-game,
    #reset-game {
      margin-top: 20px;
      background-color: #80cbc4;
      color: #004d40;
      padding: 12px 20px;
      margin-right: 20px;
    }

    #mmm {
      margin-top: 20px;
      background-color: #ffab91;
      color: #bf360c;
      padding: 12px 20px;
    }

    #mmm::after {
      content: '';
      opacity: 0;
      transition: opacity 2s ease, content 5s ease;
    }

    #start-game:hover,
    #reset-game:hover {
      background-color: #4db6ac;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 77, 64, 0.3);
    }

    #mmm:hover {
      background-color: #ff8a65;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(191, 54, 12, 0.3);
      font-size: 0;
    }

    #mmm:hover::after {
      content: 'I dont recommend clicking this...';
      font-size: 1rem;
      opacity: 1;
    }

    #mmm.clicked:hover {
      font-size: x-large;
    }

    #mmm.clicked:hover::after {
      content: '';
      opacity: 0;
    }
    
    #start-game:disabled {
      background-color: #a8d5d1;
      color: #e0e0e0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      opacity: 0.6;
    }

    #mmm:disabled {
      background-color: #e26b47;
      color: #e0e0e0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      font-size: x-large;
    }

    #reset-game:disabled {
      background-color: #a8d5d1;
      color: #e0e0e0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      opacity: 0.6;
    }

    .tictactoe-container {
      text-align: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-gap: 10px;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .board:disabled{
      pointer-events: none;
      opacity: 0.6;
    }

    .cell {
      width: 80px;
      height: 80px;
      background-color: rgba(255, 255, 255, 0.7);
      border: 2px solid #aed581;
      border-radius: 8px;
      font-size: 2rem;
      font-weight: bold;
      color: #558b2f;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell:hover {
      background-color: white;
      box-shadow: 0 4px 8px rgba(85, 139, 47, 0.2);
      transform: translateY(-2px);
    }

    .game-status {
      font-size: 1.2rem;
      color: #558b2f;
      margin-top: 20px;
      font-weight: 500;
      min-height: 30px;
    }

    .reset-btn {
      margin-top: 20px;
      background-color: #aed581;
      color: #558b2f;
    }

    .reset-btn:hover {
      background-color: #9ccc65;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(85, 139, 47, 0.3);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      section {
        padding: 30px 15px;
      }

      .board {
        grid-template-columns: repeat(3, 60px);
      }

      .cell {
        width: 60px;
        height: 60px;
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <section id="todo-section">
    <h1>📝 My Tasks</h1>
    <div class="todo-container">
      <div class="input-group">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button id="add-btn">Add</button>
      </div>
      <ul id="tasks-list">
        <li class="task-item" id="welcome-msg">
          <span>Welcome! Add your first task above</span>
          <div class="task-buttons"></div>
        </li>
      </ul>
    </div>
  </section>
  <section id="game-section">
    <h1>🎮 Move the Rectangle</h1>
    <div class="game-container">
      <div class="game-info">Use arrow keys to move the rectangle</div>
      <div id="game-canvas">
        <div id="rectangle"></div>
      </div>
      <button id="start-game">Start Game</button>
      <button id="reset-game">Reset</button>
      <button id="mmm">Mmm</button>
    </div>
  </section>
  <section id="tictactoe-section">
    <h1>⭕ Tic Tac Toe</h1>
    <div class="tictactoe-container">
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <div class="game-status" id="game-status"></div>
      <button class="reset-btn" id="reset-btn">New Game</button>
    </div>
  </section>
  <script>

    // ============================================
    // To-do List
    // ============================================

    const taskInput = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const tasksList = document.getElementById('tasks-list');
    const welcomeMsg = document.getElementById('welcome-msg');
    const todoSection = document.getElementById('todo-section');

    function updateWelcomeMessage() {
      const actualTasks = tasksList.querySelectorAll('.task-item:not(#welcome-msg)');
      if (actualTasks.length === 0) {
        welcomeMsg.style.display = 'flex';
      } else {
        welcomeMsg.style.display = 'none';
      }
    }

    addBtn.addEventListener('click', () => {
      const taskText = taskInput.value.trim();
      if (taskText) {
        const actualTasks = tasksList.querySelectorAll('.task-item:not(#welcome-msg)');
        const isFirstTask = actualTasks.length === 0;
        
        const taskWrapper = document.createElement('div');
        taskWrapper.className = 'task-wrapper';
        
        const taskItem = document.createElement('li');
        taskItem.className = 'task-item';
        
        const taskSpan = document.createElement('span');
        taskSpan.textContent = taskText;
        
        taskItem.appendChild(taskSpan);
        
        const taskButtons = document.createElement('div');
        taskButtons.className = 'task-buttons';
        
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '❌';
        removeBtn.addEventListener('click', () => {
          taskWrapper.classList.add('remove-animation');
          setTimeout(() => {
            taskWrapper.remove();
            updateWelcomeMessage();
          }, 500);
        });
        
        const completedBtn = document.createElement('button');
        completedBtn.className = 'completed-btn';
        completedBtn.textContent = '✅';
        let isCompleted = false;
        
        completedBtn.addEventListener('click', () => {
          completedBtn.classList.add('bounce-animation');
          isCompleted = !isCompleted;
          if (isCompleted) {
            taskSpan.style.textDecoration = 'line-through';
            taskSpan.style.color = '#9e9e9e';
            completedBtn.classList.add('active');
          } else {
            taskSpan.style.textDecoration = 'none';
            taskSpan.style.color = '#424242';
            completedBtn.classList.remove('active');
          }
          setTimeout(() => {
            completedBtn.classList.remove('bounce-animation');
          }, 600);
        });
        
        taskButtons.appendChild(removeBtn);
        taskButtons.appendChild(completedBtn);
        
        taskWrapper.appendChild(taskItem);
        taskWrapper.appendChild(taskButtons);
        
        if (isFirstTask) {
          addBtn.disabled = true;
          todoSection.style.paddingTop = '40px';
          setTimeout(() => {
            tasksList.appendChild(taskWrapper);
            taskInput.value = '';
            updateWelcomeMessage();
            addBtn.disabled = false;
          }, 1500);
        } else {
          tasksList.appendChild(taskWrapper);
          taskInput.value = '';
          updateWelcomeMessage();
        }
      }
    })
    updateWelcomeMessage();

    // ============================================
    // Cube Game
    // ============================================

    const rectangle = document.getElementById('rectangle');
    const startGameBtn = document.getElementById('start-game');
    const resetGameBtn = document.getElementById('reset-game');
    const mmmBtn = document.getElementById('mmm');
    const sections = document.querySelectorAll('section');
    const gameCanvas = document.getElementById('game-canvas');
    
    let posX = 50; 
    let posY = 50; 
    let cubeSize = 100;
    let gameStarted = false;
    let mmmGame = false;

    startGameBtn.addEventListener('click', () => {
      gameStarted = true;
      startGameBtn.disabled = true;
      mmmBtn.disabled = true;
      startGameBtn.textContent = 'Game Started';
    });

    resetGameBtn.addEventListener('click', () => {
      posX = 50;
      posY = 50;
      cubeSize = 100;
      rectangle.style.left = '50%';
      rectangle.style.top = '50%';
      rectangle.style.width = '60px';
      rectangle.style.height = '60px';
      gameStarted = false;
      mmmGame = false;
      startGameBtn.disabled = false;
      mmmBtn.disabled = false;
      mmmBtn.textContent = 'Mmm';
      startGameBtn.textContent = 'Start Game';
      document.body.style.overflow = 'auto';
    });

    mmmBtn.addEventListener('click', () => {
      mmmGame = true;
      gameStarted = false;
      mmmBtn.disabled = true;
      mmmBtn.classList.add('clicked');
      mmmBtn.textContent = 'You should not have clicked this...';
      startGameBtn.style.display = 'none';
      resetGameBtn.style.display = 'none';
      gameCanvas.style.overflow = 'visible';
      document.body.style.overflow = 'hidden';
      sections.style.position = 'relative';
      rectangle.style.zIndex = '9999';
      
    });

    document.addEventListener('keydown', (p) => {
      if (!gameStarted) return;
      else if (mmmGame === true) return;
      
      switch (p.key) {
        case 'ArrowUp':
          p.preventDefault();
          posY = Math.max(0, posY - 2);
          break;
        case 'ArrowDown':
          p.preventDefault();
          posY = Math.min(100, posY + 2);
          break;
        case 'ArrowLeft':
          p.preventDefault();
          posX = Math.max(0, posX - 2);
          break;
        case 'ArrowRight':
          p.preventDefault();
          posX = Math.min(100, posX + 2);
          break;
      }
      rectangle.style.left = `${posX}%`;
      rectangle.style.top = `${posY}%`;
    });

    document.addEventListener('keydown', (p) => {
      if (!mmmGame) return;
  
      p.preventDefault();
      const randomAngle = Math.random() * Math.PI * 2;
      const distance = 5;
      posX += Math.cos(randomAngle) * distance;
      posY += Math.sin(randomAngle) * distance;
      cubeSize += 3;
      
      rectangle.style.left = `${posX}px`;
      rectangle.style.top = `${posY}px`;
      rectangle.style.width = `${60 * (cubeSize / 100)}px`;
      rectangle.style.height = `${60 * (cubeSize / 100)}px`;
      rectangle.style.transform = 'none';
    });

    // ============================================
    // Tic Tac Toe Game
    // ============================================

    const board = document.getElementById('board');
    const cells = document.querySelectorAll('.cell');
    const gameStatus = document.getElementById('game-status');
    const resetBtn = document.getElementById('reset-btn');

    let currentPlayer = null;
    let playerSymbol = null; 
    let computerSymbol = null; 
    let gameActive = false;
    let boardState = ['', '', '', '', '', '', '', '', ''];
    let gameDisabled = false;

    const winningConditions = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function checkResult() {
      let roundWon = false;
      for (let i = 0; i < winningConditions.length; i++) {
        const [a, b, c] = winningConditions[i];
        if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
          roundWon = true;
          break;
        }
      }
      if (roundWon) {
        if (currentPlayer === computerSymbol) {
          gameStatus.textContent = "Player (you) wins!";
        } else {
          gameStatus.textContent = "Computer wins!";
        }
        gameActive = false;
        gameDisabled = true;
        return;
      }
      if (!boardState.includes('')) {
        gameStatus.textContent = "It's a draw!";
        gameActive = false;
        gameDisabled = true;
        return;
      }
    }

    function playerMove() {
      cells.forEach(cell => {
        cell.addEventListener('click', () => {
          const index = cell.getAttribute('data-index');
          if (boardState[index] === '' && gameActive && !gameDisabled && currentPlayer === playerSymbol) {
            boardState[index] = playerSymbol;
            cell.textContent = playerSymbol;
            currentPlayer = computerSymbol;
            checkResult();
            if (gameActive) {
              gameStatus.textContent = `Computer's turn (${computerSymbol})`;
              gameDisabled = true;
              setTimeout(computerMove, 500);
            }
          }
        });
      });
    }

    function computerMove() {
      let availableCells = [];
      boardState.forEach((cell, index) => {
        if (cell === '') availableCells.push(index);
      });
      if (availableCells.length === 0) return;
      const randomIndex = Math.floor(Math.random() * availableCells.length);
      const cellIndex = availableCells[randomIndex];
      boardState[cellIndex] = computerSymbol;
      cells[cellIndex].textContent = computerSymbol;
      currentPlayer = playerSymbol;
      checkResult();
      if (gameActive) {
        gameStatus.textContent = `Your turn (${playerSymbol})`;
        gameDisabled = false;
      } // Me gustaria mejorar la IA pero no quiero retrasarme en el proyecto, asi que lo dejo asi por ahora :D. Ya ire investigando como hacerla mejor, cuando eso, si lo logro, te dejare un mensaje para que lo veas.
    }

    resetBtn.addEventListener('click', () => {
      const randomStart = Math.random() > 0.5;
      playerSymbol = randomStart ? 'X' : 'O';
      computerSymbol = randomStart ? 'O' : 'X';
      currentPlayer = 'X';
      boardState = ['', '', '', '', '', '', '', '', ''];
      cells.forEach(cell => cell.textContent = '');
      gameActive = true;
      gameDisabled = false;
      if (playerSymbol === 'X') {
        gameStatus.textContent = `Your turn (${playerSymbol})`;
      } else {
        gameStatus.textContent = `Computer's turn (X)`;
        gameDisabled = true;
        setTimeout(computerMove, 500);
      }
    });

    playerMove();
      if (currentPlayer === 'O') {
        gameStatus.textContent = "Computer's turn (X)";
        setTimeout(computerMove, 500);
      } else {
        playerMove();
      }
  </script>
</body>
</html>
